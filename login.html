<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gas Track</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-content">
            <div class="logo"><img src="logo.png" alt="Logo" class="nav-logo"> Gas Track</div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="register.html" class="nav-btn">Register</a>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Sign in to your account</p>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" class="form-input" placeholder="john@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" class="form-input" placeholder="Enter password"
                            required>
                    </div>
                    <span id="loginError" class="error"></span>
                </div>

                <div class="form-group remember-group">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>

                <button type="submit" class="auth-btn">Sign In</button>

                <!-- <div class="demo-accounts">
                    <p><strong>Demo Accounts:</strong></p> -->
                <!-- <p>👤 demo@customer.com / password123</p>
                    <p>🚚 demo@delivery.com / password123</p>
                    <p>⚙️ admin@admin.com / admin123</p> -->
                <!-- </div> -->

                <div class="auth-footer">
                    <p>Don't have an account? <a href="register.html" class="auth-link">Register</a></p>
                </div>
            </form>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Gas Track. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
