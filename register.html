<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Gas Track</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div class="logo"><img src="logo.png" alt="Logo" class="nav-logo"> Gas Track</div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="login.html" class="nav-btn">Login</a>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Join now to start ordering LPG cylinders</p>
            </div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="fullName" class="form-input" placeholder="John Doe" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" class="form-input" placeholder="john@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Phone</label>
                    <div class="input-group">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="phone" class="form-input" placeholder="9876543210" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Address</label>
                    <div class="input-group">
                        <i class="fas fa-map-pin"></i>
                        <input type="text" id="address" class="form-input" placeholder="Your address" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Register As</label>
                    <div class="input-group">
                        <i class="fas fa-id-badge"></i>
                        <select id="registerRole" class="form-input" required>
                            <option value="">Select Role</option>
                            <option value="customer">Customer</option>
                            <option value="delivery">Delivery Personnel</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="regPassword" class="form-input" placeholder="Enter password" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm password" required>
                    </div>
                    <span id="regError" class="error"></span>
                </div>

                <button type="submit" class="auth-btn">Create Account</button>

                <div class="auth-footer">
                    <p>Already have an account? <a href="login.html" class="auth-link">Sign in</a></p>
                </div>
            </form>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Gas Track. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
