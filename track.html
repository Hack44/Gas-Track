<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order - Gas Track</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div class="logo"><img src="logo.png" alt="Logo" class="nav-logo"> Gas Track</div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="dashboard.html" class="nav-btn">Dashboard</a>
                <button class="nav-btn" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <section class="track-hero">
            <div class="hero-content">
                <h1><i class="fas fa-search-location"></i> Track Your LPG Delivery</h1>
                <p>Enter your order ID to get real-time updates on your gas cylinder delivery</p>
            </div>
        </section>

        <section class="track-page">
            <div class="track-card">
                <div class="card-header">
                    <h2><i class="fas fa-map-marker-alt"></i> Order Tracking</h2>
                </div>
                <div class="track-search">
                    <div class="search-box">
                        <div class="input-group">
                            <i class="fas fa-hashtag"></i>
                            <input type="text" id="pageTrackOrderId" placeholder="Enter Order ID (e.g., ORD-001)">
                        </div>
                        <button class="btn btn-primary track-btn" onclick="pageTrack()">
                            <i class="fas fa-search"></i>
                            <span>Track Order</span>
                        </button>
                    </div>
                </div>
                <div id="pageTrackResult" class="track-info-container" style="display:none;"></div>
                <div id="noOrderMessage" class="info-message" style="display:none;">
                    <div class="message-content">
                        <i class="fas fa-search"></i>
                        <h3>Ready to Track</h3>
                        <p>Enter your Order ID above to get started</p>
                    </div>
                </div>
                <div id="orderNotFoundMessage" class="error-message" style="display:none;">
                    <div class="message-content">
                        <i class="fas fa-exclamation-circle"></i>
                        <h3>Order Not Found</h3>
                        <p id="notFoundText">Please check your Order ID and try again</p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Gas Track. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
